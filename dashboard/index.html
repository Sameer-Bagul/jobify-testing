<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jobify Automation Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800 p-8">
  <div class="max-w-3xl mx-auto bg-white rounded-2xl shadow-xl p-8 border border-slate-200">
    <div class="mb-8 text-center">
      <h1 class="text-3xl font-extrabold text-[#0F172A] mb-2">Playwright Automation Launcher</h1>
      <p class="text-slate-500">Fill out your candidate details below to run the Playwright test with your data.</p>
    </div>

    <form id="automation-form" class="space-y-6">
      <!-- Personal Info -->
      <div>
        <h2 class="text-lg font-bold text-slate-800 mb-4 border-b pb-2">1. Personal Information</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">First Name</label>
            <input type="text" name="firstName" value="Aarav" required class="w-full border border-slate-200 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 outline-none">
          </div>
          <div>
            <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Last Name</label>
            <input type="text" name="lastName" value="Patel" required class="w-full border border-slate-200 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 outline-none">
          </div>
          <div>
            <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Email</label>
            <input type="email" name="email" value="aarav.patel@example.com" required class="w-full border border-slate-200 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 outline-none">
          </div>
          <div>
            <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Mobile</label>
            <input type="text" name="mobile" value="+91 9876543210" required class="w-full border border-slate-200 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 outline-none">
          </div>
          <div class="md:col-span-2">
            <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Address</label>
            <input type="text" name="address" value="123, Tech Park, Andheri East, Mumbai, Maharashtra 400069" required class="w-full border border-slate-200 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 outline-none">
          </div>
          <div>
            <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Location</label>
            <input type="text" name="location" value="Mumbai, India" required class="w-full border border-slate-200 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 outline-none">
          </div>
          <div>
            <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Phone Type</label>
            <select name="phoneType" class="w-full border border-slate-200 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 outline-none">
              <option value="Mobile" selected>Mobile</option>
              <option value="Home">Home</option>
              <option value="Work">Work</option>
            </select>
          </div>
        </div>
      </div>

      <!-- Education -->
      <div>
        <h2 class="text-lg font-bold text-slate-800 mb-4 border-b pb-2">2. Education</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">College/University</label>
            <input type="text" name="college" value="IIT Bombay" required class="w-full border border-slate-200 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 outline-none">
          </div>
          <div>
            <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Specialization</label>
            <input type="text" name="specialization" value="Computer Science & Engineering" required class="w-full border border-slate-200 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 outline-none">
          </div>
          <div>
            <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Degree</label>
            <select name="degree" class="w-full border border-slate-200 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 outline-none">
              <option value="B.Tech" selected>B.Tech</option>
              <option value="B.E.">B.E.</option>
              <option value="MCA">MCA</option>
            </select>
          </div>
          <div>
            <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Graduation Year</label>
            <select name="gradYear" class="w-full border border-slate-200 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 outline-none">
              <option value="2024">2024</option>
              <option value="2023" selected>2023</option>
              <option value="2022">2022</option>
            </select>
          </div>
        </div>
      </div>

      <!-- Experience -->
      <div>
        <h2 class="text-lg font-bold text-slate-800 mb-4 border-b pb-2">3. Experience</h2>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
          <div>
            <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Company</label>
            <input type="text" name="company" value="Tata Consultancy Services (TCS)" required class="w-full border border-slate-200 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 outline-none">
          </div>
          <div>
            <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Designation</label>
            <input type="text" name="designation" value="Software Engineer" required class="w-full border border-slate-200 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 outline-none">
          </div>
          <div>
            <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Duration</label>
            <input type="text" name="duration" value="1 year 2 months" required class="w-full border border-slate-200 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 outline-none">
          </div>
        </div>
      </div>

      <!-- Skills -->
      <div>
        <h2 class="text-lg font-bold text-slate-800 mb-4 border-b pb-2">4. Skills</h2>
        <div>
          <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Comma-separated skills</label>
          <input type="text" name="skills" value="React, Node.js, Playwright, Tailwind" required class="w-full border border-slate-200 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 outline-none">
        </div>
      </div>

      <button type="submit" id="submit-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl transition-all shadow-lg hover:shadow-xl focus:ring-4 focus:ring-blue-200 mt-6">
        Launch Playwright Automation
      </button>
      <div id="status" class="mt-4 text-center font-semibold text-emerald-600 hidden">
        Test is running! Check your terminal and browser window.
      </div>
    </form>
  </div>

  <script>
    document.getElementById('automation-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const formData = new FormData(e.target);
      const data = Object.fromEntries(formData.entries());
      
      const btn = document.getElementById('submit-btn');
      const status = document.getElementById('status');
      
      btn.disabled = true;
      btn.innerText = 'Starting...';
      btn.classList.add('opacity-50', 'cursor-not-allowed');
      status.classList.add('hidden');

      try {
        const response = await fetch('/run-automation', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });

        if (response.ok) {
          status.classList.remove('hidden');
        } else {
          alert('Failed to start automation');
        }
      } catch (err) {
        alert('Error communicating with server');
      } finally {
        setTimeout(() => {
          btn.disabled = false;
          btn.innerText = 'Launch Playwright Automation';
          btn.classList.remove('opacity-50', 'cursor-not-allowed');
        }, 3000);
      }
    });
  </script>
</body>
</html>
